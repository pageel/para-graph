# PARA Tool Manifest — para-graph
# This file is included in the distribution tarball.
# Validated by: para-workspace/registry/tool.schema.json

name: para-graph
version: "0.8.0"
runtime: node
min_runtime_version: "18.0.0"
entry: dist/cli.js
description: "Hybrid Code-Knowledge Graph for PARA Workspace"
repo: "https://github.com/pageel/para-graph"

# Bundled AI Intelligence — installed by para-workspace install-tool (v1.8.1+)
# Agent reads this block, lists artifacts, prompts user for consent.
agents:
  workflows:
    - source: templates/agents/workflows/para-graph.md
      target: para-graph.md
      version: "1.8.0"
  skills:
    - source: templates/agents/skills/graph-enrichment/
      target: graph-enrichment/
      version: "1.0.0"
  rules:
    - source: templates/agents/rules/graph-first-policy.md
      target: graph-first-policy.md
      version: "1.0.0"

# MCP Server configuration — parsed by para-workspace mcp-setup (v1.8.2+)
# Enables auto-configuration of IDE MCP settings during install-tool.
mcp:
  server_name: "para-graph"
  transport: stdio
  serve_args: ["serve", "${WORKSPACE_ROOT}"]
  description: "Code-Knowledge Graph — query, enrich, impact analysis"
